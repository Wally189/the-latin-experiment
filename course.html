<title>The Latin Experiment — Course</title>
<style>html,body{margin:0;min-height:100%;background:#efe3d6}body{font-family:system-ui,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;padding:30px;color:#1d0806;text-align:center}</style>

<body>
<div class="loading">Opening your next lesson…</div>
<script>
const legacyLesson=/^#lesson-(\d+)$/.exec(location.hash);if(legacyLesson){const url=new URL(location.href);url.searchParams.set('lesson',legacyLesson[1]);url.hash='';history.replaceState({},'',url.pathname+url.search)}
fetch('course-source.html?v=20260720-1015',{cache:'no-store'})
  .then(response=>{if(!response.ok)throw new Error('Course source could not be loaded.');return response.text()})
  .then(source=>{
    if(!source.includes('</body>'))throw new Error('Course source is incomplete.');
    const scripts='<script src="reader-progress.js?v=20260720-1015"><\/script><script src="course-enhancements.js?v=20260720-1015"><\/script><script src="lesson-template.js?v=20260720-1015"><\/script><script src="lesson-media.js?v=20260720-1015"><\/script><script src="course-progress.js?v=20260720-1015"><\/script><script src="church-connection.js?v=20260720-1015"><\/script>';
    const output=source.replace('</body>',scripts+'</body>');
    document.open();document.write(output);document.close();
  })
  .catch(error=>{document.body.innerHTML='<main class="loading"><p><strong>The course could not be opened.</strong><br>'+error.message+'</p></main>'});
</script>
</body>
