<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Latin Experiment — Course</title>
<style>html,body{margin:0;min-height:100%;background:#efe3d6}body{font-family:system-ui,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;padding:30px;color:#1d0806;text-align:center}</style>
</head>
<body>
<div class="loading">Opening your next lesson…</div>
<script>
const legacyLesson=/^#lesson-(\d+)$/.exec(location.hash);if(legacyLesson){const url=new URL(location.href);url.searchParams.set('lesson',legacyLesson[1]);url.hash='';history.replaceState({},'',url.pathname+url.search)}
fetch('course-source.html?v=20260720-1030',{cache:'no-store'})
  .then(response=>{if(!response.ok)throw new Error('Course source could not be loaded.');return response.text()})
  .then(source=>{
    if(!source.includes('</body>'))throw new Error('Course source is incomplete.');
    const notebookPatch=`<style>
      .notebook.lesson-one-evidence{min-height:0!important;height:auto!important;padding:10px!important;background:#f7f0e5!important;transform:none!important;font-family:system-ui,sans-serif!important}
      .lesson-one-evidence-list{display:grid;gap:14px}
      .lesson-one-evidence-card{margin:0;overflow:hidden;border-radius:14px;background:#fffaf2}
      .lesson-one-evidence-card img{display:block;width:100%;height:auto;max-height:none;object-fit:contain;background:#eee5d8}
      .lesson-one-evidence-card figcaption{padding:11px 13px;color:#655a52;font:14px/1.45 system-ui,sans-serif;background:#fffaf2}
    </style><script>
      (()=>{
        const renderNotebook=()=>{
          const lesson=window.LatinLessonTemplate?.currentLesson;
          if(Number(lesson?.number)!==1)return;
          const notebook=document.querySelector('.lesson-page .notebook');
          if(!notebook)return;
          notebook.className='placeholder notebook lesson-one-evidence';
          notebook.innerHTML='<div class="lesson-one-evidence-list">'
            +'<figure class="lesson-one-evidence-card"><img src="assets/lesson-one-notebook-1.jpg?v=20260720-1030" alt="Open notebook showing handwritten Lesson I notes and highlighted Latin words"><figcaption>Notebook spread — first observations and repeated forms</figcaption></figure>'
            +'<figure class="lesson-one-evidence-card"><img src="assets/lesson-one-notebook-2.jpg?v=20260720-1030" alt="Handwritten Lesson I vocabulary list dated 20 July 2026"><figcaption>Vocabulary list — words gathered during the lesson</figcaption></figure>'
            +'</div>';
        };
        window.addEventListener('latin-lesson-rendered',()=>setTimeout(renderNotebook,0));
        setTimeout(renderNotebook,500);
      })();
    <\/script>`;
    const scripts='<script src="reader-progress.js?v=20260720-1030"><\/script><script src="course-enhancements.js?v=20260720-1030"><\/script><script src="lesson-template.js?v=20260720-1030"><\/script><script src="lesson-media.js?v=20260720-1030"><\/script><script src="course-progress.js?v=20260720-1030"><\/script><script src="church-connection.js?v=20260720-1030"><\/script>'+notebookPatch;
    const output=source.replace('</body>',scripts+'</body>');
    document.open();document.write(output);document.close();
  })
  .catch(error=>{document.body.innerHTML='<main class="loading"><p><strong>The course could not be opened.</strong><br>'+error.message+'</p></main>'});
</script>
</body>
</html>
