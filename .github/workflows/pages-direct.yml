name: Deploy repository directly to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build publish directory
        env:
          RELEASE_VERSION: ${{ github.sha }}
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '_site' ./ _site/
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ['RELEASE_VERSION']
          index = Path('_site/index.html')
          source = index.read_text(encoding='utf-8')

          old_script = '<script src="schedule.js"></script>'
          new_scripts = (
              f'<script src="schedule.js?v={version}"></script>\n'
              f'<script src="certificates.js?v={version}"></script>'
          )

          if old_script not in source:
              raise SystemExit('Expected schedule script tag was not found in index.html')
          source = source.replace(old_script, new_scripts)

          old_certificates = '''<section class="view" data-v="certificates" hidden><h1>Certificates</h1><div class="note"><b>These are personal learning milestones, not accredited qualifications.</b></div><div class="cards"><div class="card badge" style="--c:var(--burgundy)"><div class="medal">I</div><h2>First lesson</h2><p>Complete the first full experiment.</p></div><div class="card badge" style="--c:var(--gold)"><div class="medal">V</div><h2>Five lessons</h2><p>Complete the first review cycle.</p></div><div class="card badge" style="--c:var(--blue)"><div class="medal">X</div><h2>Ten lessons</h2><p>Establish a repeatable learning rhythm.</p></div></div></section>'''
          new_certificates = '''<section class="view" data-v="certificates" hidden><h1>Certificates</h1><div class="note"><b>Loading the six-stage course progression…</b></div></section>'''

          if old_certificates not in source:
              raise SystemExit('Obsolete certificate markup was not found in index.html')
          source = source.replace(old_certificates, new_certificates)

          index.write_text(source, encoding='utf-8')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload prepared site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
