name: Deploy Latin Experiment to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply approved footer and accessibility standards
        run: |
          python - <<'PY'
          from pathlib import Path

          old = 'This website has been built with the assistance of AI tools. Where appropriate this has been cross validated with Magnifica Humanae'
          new = 'This website has been built with the assistance of AI tools. Where appropriate, content has been checked against Magnifica Humanae and relevant authoritative Catholic sources.'

          for path in Path('.').rglob('*'):
              if not path.is_file() or path.suffix.lower() not in {'.html', '.js', '.css'}:
                  continue
              text = path.read_text(encoding='utf-8').replace(old, new)
              if path.suffix.lower() == '.html':
                  text = text.replace('<div class="brand-mark">✠</div>', '<div class="brand-mark" aria-hidden="true">✠</div>')
                  text = text.replace('<button class="progress-chip">My progress · 0%</button>', '<div class="progress-chip" role="status" aria-live="polite">My progress · 0 of 81 complete</div>')
                  text = text.replace('<div class="progress-track"><span></span></div>', '<div class="progress-track" role="progressbar" aria-label="Course progress" aria-valuemin="0" aria-valuemax="81" aria-valuenow="0"><span></span></div>')
                  if '@media (prefers-reduced-motion: reduce)' not in text:
                      text = text.replace('</style>', '.global-nav a:focus-visible,.book-card a:focus-visible,.side-card a:focus-visible,.reader-actions button:focus-visible,.quick-action:focus-visible,.path-card:focus-visible,.complete-button:focus-visible,.mobile-catalogue button:focus-visible{outline:3px solid rgba(221,169,55,.55);outline-offset:3px}@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto!important}*,*::before,*::after{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important;animation-iteration-count:1!important}}</style>', 1)
              if path.name == 'course-progress.js':
                  text = text.replace("track.style.width = `${Math.max(percentage, count ? 1.25 : 0)}%`;", "track.style.width = `${Math.max(percentage, count ? 1.25 : 0)}%`; track.parentElement?.setAttribute('aria-valuenow', String(count));")
              path.write_text(text, encoding='utf-8')
          PY
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
