name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build existing site and Course page
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Build source not found: {label}')
              return text.replace(old, new, 1)

          course = Path('course-source.html').read_text(encoding='utf-8')
          navigation = {
              '<a href="#">⌂ Home</a>': '<a href="index.html#home">⌂ Home</a>',
              '<a href="#" aria-current="page">▤ Course</a>': '<a href="course.html" aria-current="page">▤ Course</a>',
              '<a href="#">▣ Schedule</a>': '<a href="index.html#schedule">▣ Schedule</a>',
              '<a href="#">▧ Materials</a>': '<a href="index.html#materials">▧ Materials</a>',
              '<a href="#">✦ Certificates</a>': '<a href="index.html#certificates">✦ Certificates</a>',
              '<a href="#">✉ Contact</a>': '<a href="index.html#contact">✉ Contact</a>',
          }
          for old, new in navigation.items():
              course = replace_once(course, old, new, old)

          editorial_replacements = [
              (
                  'The experiment begins here: one ordinary Catholic, Father William Most’s course, a notebook, a microphone and a determination to discover whether the Church’s language can become something genuinely usable.',
                  'The experiment begins here: one Catholic learning in public, Father William Most’s course, a notebook, a microphone and a determination to discover whether the Church’s language can become something genuinely usable.',
                  'Lesson I opening description',
              ),
              (
                  '<div class="fact"><strong>Based on</strong><span>Father William Most<br><em>Latin by the Natural Method</em></span></div>',
                  '<div class="fact"><strong>Based on</strong><span>Father William Most<br><a class="book-title-link" href="index.html#materials"><em>Latin by the Natural Method</em></a></span></div>',
                  'linked primary text',
              ),
              (
                  'Day 1.<br><br>Excited. A little daunted. This is where my own account will appear after I complete the lesson.<br><br>— A.W.G.',
                  'Day 1. Excited. A little daunted.<br><br>Today I open Lesson I, read it aloud before I know what I am doing, and begin finding out whether the language can become usable. My honest account will replace this note after I complete the lesson.<br><br>— A.W.G.',
                  'Day 1 note',
              ),
              (
                  'Original supplementary examples; Father Most’s lesson remains in the book.',
                  'Supplementary examples. Review Lesson I in Father Most’s book first; these sentences are here only to help me notice the pattern without reproducing the lesson.',
                  'supplementary examples note',
              ),
              (
                  'The audio slots are ready for Alan’s real recordings.',
                  'I record myself before studying the lesson and again afterwards, then add my immediate reactions: what changed, what still felt awkward and what I misunderstood.',
                  'Hear the experiment explanation',
              ),
              (
                  'This will preserve the honest starting point rather than pretending to be an authoritative pronunciation guide.',
                  'Recorded before study: an honest first attempt, followed by my immediate reaction to what sounded uncertain, unfamiliar or simply wrong.',
                  'before-study recording explanation',
              ),
              (
                  'Recorded after reading, handwriting practice, repeated speech and comprehension work.',
                  'Recorded after reading, handwriting, repeated speech and comprehension work, followed by my reaction to what improved and what still needs practice.',
                  'after-study recording explanation',
              ),
              (
                  'Five repeatable stages for every published lesson.',
                  'The five repeatable stages used throughout the experiment.',
                  'five-stage description',
              ),
              (
                  'A concise explanation in ordinary English.',
                  'A concise explanation in clear English.',
                  'clear English wording',
              ),
              (
                  '<div class="placeholder"><strong>Publication boundary:</strong> after Alan completes the lesson, this area will contain his own summary, short attributed references where justified, original supplementary examples and the patterns he found. It will not reproduce Father Most’s lesson wholesale.</div>',
                  '<div class="lesson-reflection"><p><strong>Before I begin:</strong> Lesson I makes the experiment concrete by presenting Latin as language rather than as a table to memorise. The first challenge is to trust complete sentences, notice recurring forms and resist translating every word before grasping the movement of the passage.</p><p>After completing the lesson, I will replace this provisional reflection with what I actually understood, where I stalled, what surprised me and whether Father Most’s natural method began to work in practice.</p></div>',
                  'What Lesson I reveals reflection',
              ),
              (
                  '<a href="#">Find a copy →</a>',
                  '<a href="index.html#materials">Find a copy →</a>',
                  'rail book link',
              ),
              (
                  '<a href="#">Find your copy →</a>',
                  '<a href="index.html#materials">Find your copy →</a>',
                  'sidebar book link',
              ),
              (
                  'what happens when ordinary Catholics begin recognising this language as something they can actually use?',
                  'what happens when Catholics begin recognising this language as something they can actually use?',
                  'manifesto wording',
              ),
          ]
          for old, new, label in editorial_replacements:
              course = replace_once(course, old, new, label)

          old_reader_turn = '''                <article class="audio-card">
                  <h3>Your turn</h3>
                  <p>Open Father Most’s book. Attempt the lesson aloud before hearing Alan’s second recording.</p>
                  <div class="reader-actions">
                    <button>🎙 Read aloud</button>
                    <button>✎ Write it by hand</button>
                    <button>◉ Record yourself privately</button>
                  </div>
                </article>'''
          new_reader_turn = '''                <article class="audio-card reader-turn">
                  <span class="reader-label">Your part in the experiment</span>
                  <h3>Your turn</h3>
                  <p>Use Father Most’s Lesson I before hearing my second recording. These checks are for your own attempt; nothing is uploaded or shared.</p>
                  <div class="reader-checklist">
                    <label class="reader-check"><input type="checkbox"> <span><strong>Read it aloud</strong><small>Make a genuine first attempt before comparing recordings.</small></span></label>
                    <label class="reader-check"><input type="checkbox"> <span><strong>Write it by hand</strong><small>Notice endings, repeated forms and anything that slows you down.</small></span></label>
                    <label class="reader-check"><input type="checkbox"> <span><strong>Record yourself privately</strong><small>Keep the recording so you can compare it after study.</small></span></label>
                  </div>
                </article>'''
          course = replace_once(course, old_reader_turn, new_reader_turn, 'distinct Your turn section')

          lesson_css = '''
          .book-title-link{color:var(--burgundy);font-weight:900;text-decoration-thickness:2px;text-underline-offset:3px}
          .reader-turn{position:relative;border:2px solid var(--gold);background:linear-gradient(145deg,#fff7dc,#fffdf8);box-shadow:0 10px 25px rgba(111,69,0,.11)}
          .reader-label{display:inline-block;margin-bottom:7px;color:#8b5b00;font-size:10px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}
          .reader-checklist{display:grid;gap:9px;margin-top:14px}
          .reader-check{display:flex;align-items:flex-start;gap:10px;padding:11px;border:1px solid #e6d29c;border-radius:12px;background:rgba(255,255,255,.82);cursor:pointer}
          .reader-check input{flex:0 0 18px;width:18px;height:18px;margin:2px 0 0;accent-color:var(--burgundy)}
          .reader-check span{display:block;color:var(--ink)}
          .reader-check strong{display:block;font-size:13px}
          .reader-check small{display:block;margin-top:2px;color:#6b625b;font-size:11px;line-height:1.4}
          .lesson-reflection{margin-top:14px;padding:18px;border-left:5px solid var(--burgundy);border-radius:0 14px 14px 0;background:#fbf6ef;color:#514945;font-size:14px;line-height:1.65}
          .lesson-reflection p{margin:0}
          .lesson-reflection p+p{margin-top:12px}
          '''
          course = replace_once(course, '</style>', lesson_css + '\n</style>', 'Lesson I editorial styles')

          if course.count('class="path-card"') != 5:
              raise SystemExit('Lesson I must contain exactly five repeatable stages')

          Path('course.html').write_text(course, encoding='utf-8')

          html = Path('index.html').read_text(encoding='utf-8')
          old_cards = '<div class=cards><div class=card><h2>Course</h2><p>Browse lessons, examinations and learning details.</p></div><div class=card style="--c:#1c3f8f"><h2>Schedule</h2><p>Set a start date and build a realistic goal.</p></div><div class=card style="--c:#d6a43a"><h2>Materials</h2><p>Collect texts, grammar notes and practice aids.</p></div></div>'
          new_cards = '<div class="cards home-links"><a class=card href=course.html><h2>Course</h2><p>Browse lessons, examinations and learning details.</p></a><a class=card style="--c:#1c3f8f" href=#schedule><h2>Schedule</h2><p>Set a start date and build a realistic goal.</p></a><a class=card style="--c:#d6a43a" href=#materials><h2>Materials</h2><p>Collect texts, grammar notes and practice aids.</p></a><a class=card style="--c:#6b2d70" href=#certificates><h2>Certificates</h2><p>See learning milestones, badges and indicative ability stages.</p></a><a class=card style="--c:#2f6b50" href=#contact><h2>Contact</h2><p>Send a question, correction or thoughtful piece of feedback.</p></a></div>'
          html = replace_once(html, old_cards, new_cards, 'Home card block')

          old_materials = '<section class=view data-v=materials hidden><h1>Materials</h1><p class=muted>Structural placeholders for lawful course access and learner-created support.</p><div class=cards><div class=card><h2>Primary text</h2><p>Father Most course access details.</p></div><div class=card style="--c:#1c3f8f"><h2>Vocabulary notebook</h2><p>Words, forms and memory cues.</p></div><div class=card style="--c:#d6a43a"><h2>Pronunciation</h2><p>Ecclesiastical Latin sound guide.</p></div><div class=card style="--c:#6b2d70"><h2>Grammar reference</h2><p>Tables in course order.</p></div><div class=card style="--c:#b3261e"><h2>Exam packs</h2><p>Review every five modules.</p></div><div class=card style="--c:#2f6b50"><h2>Learning journal</h2><p>Questions and reflections.</p></div></div></section>'
          new_materials = '''<section class=view data-v=materials hidden><h1>Materials</h1><p class=muted>The experiment accompanies Father William Most’s <em>Latin by the Natural Method</em>. Use the original book as the primary text; this site records and supports the learning journey rather than reproducing it.</p><div class=cards><div class=card><h2>Browse Volume I</h2><p>Read the first-year edition in the Internet Archive book reader or download one of the formats offered there.</p><p><a class=btn href="https://archive.org/details/Latin_method_Most_1stYear" target="_blank" rel="noopener">Browse the archived edition →</a></p></div><div class=card style="--c:#1c3f8f"><h2>Buy the book</h2><p>Mediatrix Press publishes a modern paperback edition of Volume I. Stock and delivery terms are controlled by the publisher.</p><p><a class=btn href="https://mediatrixpress.com/product/latin-by-the-natural-method-vol-1/" target="_blank" rel="noopener">Visit the publisher →</a></p></div><div class=card style="--c:#d6a43a"><h2>Find a library copy</h2><p>Open Library records the 1960 and modern editions and provides links for locating copies in library catalogues.</p><p><a class=btn href="https://openlibrary.org/books/OL27507569M/Latin_by_the_Natural_Method" target="_blank" rel="noopener">Check library listings →</a></p></div><div class=card style="--c:#6b2d70"><h2>Vocabulary notebook</h2><p>Words, forms and memory cues created during the experiment.</p></div><div class=card style="--c:#b3261e"><h2>Pronunciation</h2><p>Ecclesiastical Latin sound guidance and the experiment’s before-and-after recordings.</p></div><div class=card style="--c:#2f6b50"><h2>Learning journal</h2><p>Questions, handwritten evidence, corrections and reflections from each completed lesson.</p></div></div></section>'''
          html = replace_once(html, old_materials, new_materials, 'Materials page')

          html = html.replace('<a href=#course data-n=course>', '<a href=course.html data-n=course>', 1)
          html = html.replace('<a class=btn href=#course>', '<a class=btn href=course.html>', 1)
          html = replace_once(html, '</style>', '</style><link rel="stylesheet" href="view-router.css">', 'view router stylesheet')
          html = replace_once(html, '</html>', '<script src="view-router.js" defer></script></html>', 'view router script')
          Path('index.html').write_text(html, encoding='utf-8')
          PY
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
