name: Rebuild Lesson I notebook images

on:
  push:
    paths:
      - '.github/workflows/rebuild-notebook-images.yml'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow
      - name: Rebuild clean PNG assets
        run: |
          python - <<'PY'
          from PIL import Image, ImageOps
          from pathlib import Path

          assets = Path('assets')

          first = Image.open(assets / 'lesson-one-notebook-1.jpg')
          first = ImageOps.exif_transpose(first).convert('RGB')
          # Remove the right-hand background where the ashtray appeared.
          first = first.crop((0, 0, int(first.width * 0.88), first.height))
          first.thumbnail((1400, 1800), Image.Resampling.LANCZOS)
          first.save(assets / 'lesson-one-notebook-clean.png', format='PNG', optimize=True)

          second = Image.open(assets / 'lesson-one-notebook-2.jpg')
          second = ImageOps.exif_transpose(second).convert('RGB')
          second.thumbnail((1400, 1800), Image.Resampling.LANCZOS)
          second.save(assets / 'lesson-one-vocabulary-clean.png', format='PNG', optimize=True)
          PY
      - name: Commit rebuilt assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/lesson-one-notebook-clean.png assets/lesson-one-vocabulary-clean.png
          git commit -m 'Add clean Lesson I notebook images'
          git push
