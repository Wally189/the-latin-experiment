name: Apply Lesson I notebook images

on:
  push:
    paths:
      - '.github/workflows/apply-lesson-one-notebook-images.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Update Lesson I notebook display
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          assets = [
              root / 'assets' / 'lesson-one-notebook-1.jpg',
              root / 'assets' / 'lesson-one-notebook-2.jpg',
          ]
          for asset in assets:
              if not asset.is_file() or asset.stat().st_size == 0:
                  raise SystemExit(f'Missing or empty notebook asset: {asset}')

          data_path = root / 'lessons-data.json'
          data = json.loads(data_path.read_text(encoding='utf-8'))
          lesson = next((item for item in data.get('lessons', []) if item.get('number') == 1), None)
          if lesson is None:
              raise SystemExit('Lesson I was not found in lessons-data.json')

          lesson['notebookImages'] = [
              {'src': 'assets/lesson-one-notebook-1.jpg', 'alt': 'Alan’s handwritten reading and translation notes for Lesson I'},
              {'src': 'assets/lesson-one-notebook-2.jpg', 'alt': 'Alan’s handwritten vocabulary notes for Lesson I'}
          ]
          lesson['notebookCaption'] = 'The original handwritten reading, translation and vocabulary notes from Lesson I.'
          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          js_path = root / 'lesson-template.js'
          js = js_path.read_text(encoding='utf-8')
          marker = "  function renderPublished(lesson) {\n"
          helper = """  function renderNotebook(lesson) {
    const images = Array.isArray(lesson.notebookImages) && lesson.notebookImages.length
      ? lesson.notebookImages
      : (lesson.notebookImage ? [{src:lesson.notebookImage, alt:lesson.notebookAlt}] : []);

    if (!images.length) {
      return `<div class=\"placeholder notebook hand\"><strong>No notebook image added yet.</strong><br><br>${escapeHtml(lesson.notebookCaption)}</div>`;
    }

    return `<div class=\"notebook-evidence\"><div class=\"notebook-gallery\">${images.map(image => `<figure><img src=\"${escapeHtml(image.src)}\" alt=\"${escapeHtml(image.alt || lesson.notebookAlt || 'Lesson notebook page')}\" loading=\"lazy\"><figcaption>${escapeHtml(image.caption || '')}</figcaption></figure>`).join('')}</div><p class=\"notebook-caption\">${escapeHtml(lesson.notebookCaption)}</p></div>`;
  }

"""
          if 'function renderNotebook(lesson)' not in js:
              if marker not in js:
                  raise SystemExit('Could not locate renderPublished insertion point')
              js = js.replace(marker, helper + marker, 1)

          old_card = '<article class="content-card"><span class="eyebrow">My notebook</span><h3>The evidence of learning</h3><div class="placeholder notebook hand"><strong>No notebook image added yet.</strong><br><br>${escapeHtml(lesson.notebookCaption)}</div></article>'
          new_card = '<article class="content-card notebook-card"><span class="eyebrow">My notebook</span><h3>The evidence of learning</h3>${renderNotebook(lesson)}</article>'
          if old_card in js:
              js = js.replace(old_card, new_card, 1)
          elif new_card not in js:
              raise SystemExit('Could not locate the notebook card safely')

          css_marker = '    .lesson-template-error{padding:40px;color:#7a2222}\n'
          notebook_css = '    .notebook-card{min-width:0}.notebook-evidence{margin-top:14px}.notebook-gallery{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.notebook-gallery figure{margin:0;overflow:hidden;border:1px solid #ded5cd;border-radius:14px;background:#f7f2ec}.notebook-gallery img{display:block;width:100%;height:auto;aspect-ratio:3/4;object-fit:cover}.notebook-gallery figcaption:empty{display:none}.notebook-caption{margin:13px 0 0;color:#5d554f;line-height:1.6}\n'
          if '.notebook-gallery{' not in js:
              if css_marker not in js:
                  raise SystemExit('Could not locate CSS insertion point')
              js = js.replace(css_marker, notebook_css + css_marker, 1)

          media_old = '@media(max-width:760px){.coming-soon-grid,.reading-grid,.reader-checklist{grid-template-columns:1fr}'
          media_new = '@media(max-width:760px){.coming-soon-grid,.reading-grid,.reader-checklist,.notebook-gallery{grid-template-columns:1fr}'
          if media_old in js:
              js = js.replace(media_old, media_new, 1)
          elif media_new not in js:
              raise SystemExit('Could not update responsive notebook layout')

          js_path.write_text(js, encoding='utf-8')
          PY
      - name: Validate code and referenced assets
        run: |
          python -m json.tool lessons-data.json >/dev/null
          node --check lesson-template.js
          grep -q 'assets/lesson-one-notebook-1.jpg' lessons-data.json
          grep -q 'assets/lesson-one-notebook-2.jpg' lessons-data.json
          grep -q 'renderNotebook(lesson)' lesson-template.js
          test -s assets/lesson-one-notebook-1.jpg
          test -s assets/lesson-one-notebook-2.jpg
      - name: Commit the focused update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/apply-lesson-one-notebook-images.yml
          git add lesson-template.js lessons-data.json .github/workflows/apply-lesson-one-notebook-images.yml
          git commit -m 'Show both Lesson I notebook images'
          git push
