name: Apply course polish
on:
  push:
    paths:
      - '.github/workflows/apply-course-polish.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add course polish script
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('course.html')
          text=path.read_text(encoding='utf-8')
          tag='<script src="course-polish.js?v=20260722-1"></script>'
          if tag not in text:
              text=text.replace('</body></html>',tag+'</body></html>')
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit generated update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add course.html
          git diff --cached --quiet || git commit -m "Load final Latin course polish"
          git push