name: One-time First Volume rename

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-first-volume.yml

permissions:
  contents: write

jobs:
  rename-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace First year with First volume
        shell: bash
        run: |
          files=(
            lesson-one.js
            lesson-template.js
            course-source.html
            site-shell.html
            certificates.js
            index.html
            index-live-fix.js
            schedule-blocks.json
            pronunciation.html
          )

          for file in "${files[@]}"; do
            if [[ -f "$file" ]]; then
              sed -i 's/First year/First volume/g' "$file"
            fi
          done

      - name: Commit the wording update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lesson-one.js lesson-template.js course-source.html site-shell.html certificates.js index.html index-live-fix.js schedule-blocks.json pronunciation.html
          if git diff --cached --quiet; then
            echo "No matching wording remained to update."
            exit 0
          fi
          git commit -m "Rename First year to First volume"
          git push
